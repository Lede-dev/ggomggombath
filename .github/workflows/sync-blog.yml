name: Sync latest Naver posts

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-latest-naver-posts
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Fetch latest posts
        run: npm run sync:blog
      - name: Commit updated data
        shell: bash
        run: |
          if git diff --quiet -- data/blog-posts.json public/sitemap.xml; then
            echo "Blog data is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/blog-posts.json public/sitemap.xml
          git commit -m "Update latest Naver blog posts"
          git push origin HEAD:master
