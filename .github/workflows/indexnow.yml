name: Notify IndexNow

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Submit canonical URLs
        run: npm run notify:indexnow
